{% extends "encyclopedia/layout.html" %}

{% block title %}
    Encyclopedia
{% endblock %}

{% block body %}
    <h1>Add Page</h1>

    <form action="{% url 'add' %}" method="POST" class="add-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Page Title</label>
            <input id="title" name="title" type="text" placeholder="Enter a title" required>
        </div>

        <div class="form-group">
            <label for="content">Page Content</label>
            <textarea id="content" name="content" rows="10" placeholder="Write your content here..." required></textarea>
        </div>

        <div class="form-group">
            <button type="submit">Create Page</button>
        </div>
    </form>


{% endblock %}
