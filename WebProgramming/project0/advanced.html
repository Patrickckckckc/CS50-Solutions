<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Image Search</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <a href = index.html class ="link">Google</a>
        <img src=icon.png>
        <form action="https://www.google.com/search" id = "form_advanced">
         <label>All these words:</label>
         <input type="text" name="as_q" autocomplete="off"><br><br>

        <label>This exact word or phrase:</label>
        <input type="text" name="as_epq" autocomplete="off"><br><br>

        <label>Any of these words:</label>
        <input type="text" name="as_oq" autocomplete="off"><br><br>

        <label>None of these words:</label>
        <input type="text" name="as_eq" autocomplete="off"><br><br>

        <button type = "submit">Advanced Search</button>
        </form>

    </body>
</html>
