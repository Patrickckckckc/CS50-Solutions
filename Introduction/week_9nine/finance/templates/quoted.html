{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Symbol</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ stock["name"] }}</td>
                <td>{{ stock["price"]| usd }}</td>
                <td>{{ stock["symbol"] }}</td>
            </tr>
        </tbody>
    </table>
{% endblock %}
