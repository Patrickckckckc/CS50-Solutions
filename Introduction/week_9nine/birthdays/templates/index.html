<!DOCTYPE html>

<html lang="en">

    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="/static/styles.css" rel="stylesheet">
        <title>Birthdays</title>
    </head>

    <body>
        <div class="header">
            <h1>Birthdays</h1>
        </div>
        <div class="container">
            <div class="section">

                <h2>Add a Birthday</h2>
                <!-- TODO: Create a form for users to submit a name, a month, and a day -->
                <form action="/" method="post">
                    <input required autocomplete="off" type="text" name="name" placeholder="Name">
                    <input required autocomplete="off" type="text" name="day" placeholder="Day">
                    <input required autocomplete="off" type="text" name="month" placeholder="Month">
                    <button id="button" type="submit">SUBMIT</button>
                </form>
            </div>

            <div class="section">

                <h2>All Birthdays</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Birthday</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- TODO: Loop through the database entries to display them in this table -->
                        {% for birthday in birthdays %}
                            <tr>
                                <td name = "birthday_name"> {{birthday["name"]}}</td>
                                <td> {{ birthday["day"] }}/{{ birthday["month"]}}</td>
                                <td style="width:30px; text-align:center; padding:0;">
                                    <form action="/eliminated" method="post">
                                        <input type="hidden" name="id" value="{{ birthday['id'] }}">
                                        <button type="submit">
                                            ❌
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </body>

</html>
